{{ $youtubeEvent := dict "video_id" .id "video_title" .title }}
<div class="vz-embed-16x9"
     @click="window.posthog && posthog.capture('youtube_play_click', {{ $youtubeEvent | jsonify }})">
  <iframe
    src="https://www.youtube-nocookie.com/embed/{{ .id }}"
    title="{{ .title }}"
    loading="lazy"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
