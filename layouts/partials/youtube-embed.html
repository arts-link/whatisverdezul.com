{{ $youtubeEvent := dict "video_id" .id "video_title" .title }}
{{/* vzTrack: CSP-safe Alpine can't eval inline capture() — see extended.js */}}
<div class="vz-embed-16x9" x-data="vzTrack"
     @click="track" data-track-event="youtube_play_click" data-track-props="{{ $youtubeEvent | jsonify }}">
  <iframe
    src="https://www.youtube-nocookie.com/embed/{{ .id }}"
    title="{{ .title }}"
    loading="lazy"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
