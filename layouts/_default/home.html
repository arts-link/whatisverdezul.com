{{ define "main" }}

{{/* Hero */}}
<section class="vz-hero">
  <div class="vz-hero__bg">
    <img src="/images/premium_photo-stag-woods.jpg" alt="" class="vz-hero__bg-img">
    <div class="vz-hero__overlay"></div>
  </div>
  <div style="position: absolute; bottom: 2rem; left: 2rem; right: 2rem; z-index: 1; text-align: center;">
    <h1 class="vz-hero__headline">{{ .Params.hero_headline | default "Verdèzul" }}</h1>
  </div>
</section>

<div class="vz-footer__top-stripe"></div>

{{/* Album image */}}
<section style="margin: 0; padding: 0; line-height: 0; display: flex; justify-content: center; overflow: hidden; background: linear-gradient(145deg, #162c1e 0%, #1b3226 25%, #1a2e34 55%, #172438 100%);">
  <img src="/images/album-ETASOBAG.jpg" alt="Verdèzul — Earthtones and Shades of Blue and Green" style="display: block; width: auto; max-width: 100%; height: auto;">
</section>

{{ end }}
