{{ define "main" }}

{{/* Hero */}}
<section class="vz-hero">
  <div class="vz-hero__bg"></div>
  <div class="vz-hero__center-box" x-data>
    <a href="/about/" class="vz-neon-box--green vz-hero__question-box"
       @click="window.posthog && posthog.capture('hero_about_click')">
      <p class="vz-hero__question">What is Verd&egrave;zul?</p>
    </a>
  </div>
  <a href="#hero-next" class="vz-hero__scroll-arrow" aria-label="Scroll down">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </a>
</section>

<div id="hero-next" class="vz-footer__top-stripe vz-hero-divider"></div>

{{/* Album image */}}
<section style="margin: 0; padding: 0; line-height: 0; display: flex; justify-content: center; overflow: hidden; background: linear-gradient(145deg, #162c1e 0%, #1b3226 25%, #1a2e34 55%, #172438 100%);">
  <img src="/images/album-ETASOBAG.jpg" alt="Verdèzul — Earthtones and Shades of Blue and Green" style="display: block; width: auto; max-width: 100%; height: auto;">
</section>

{{ end }}
