{{ define "main" }}

{{/* Hero */}}
<section class="vz-hero">
  <div class="vz-hero__bg">
    <img src="/images/premium_photo-stag-woods.jpg" alt="" class="vz-hero__bg-img">
    <div class="vz-hero__overlay"></div>
  </div>
  <div style="position: absolute; bottom: 2rem; left: 2rem; right: 2rem; z-index: 1; text-align: center;">
    <h1 class="vz-hero__headline">{{ .Params.hero_headline | default "Verdèzul" }}</h1>
  </div>
</section>

{{/* Logo reveal */}}
<section style="display: flex; justify-content: center; align-items: center; padding: 2rem 1rem;">
  <img src="/images/logo-white-trans-cropped.png" alt="Verdèzul"
       style="display: block; width: auto; height: auto; max-width: 100%;">
</section>

{{/* Group photo */}}
<section style="margin: 0; padding: 0; line-height: 0; display: flex; justify-content: center; overflow: hidden;">
  <img src="/images/verdezul-group-1.jpg" alt="Verdèzul" style="display: block; width: auto; max-width: 100%; height: auto;">
</section>

{{ end }}
