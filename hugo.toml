baseURL = "https://whatisverdezul.com/"
languageCode = "en-us"
title = "Verdèzul"
theme = "ryder"

[params]
  description = "Official site for Verdèzul — Los Angeles-based hip-hop duo. Music, shows, merch."
  analytics_provider = "posthog"
  showDarkToggle = false
  logo_png = "/images/logo-trans-512.png"
  headerType = "-verdezul"
  footerType = "-verdezul"
  menuType = "-verdezul"
  showHomeFeed = false
  showBreadCrumbs = false
  og_image_default = "/images/og/og-home.png"

[params.csp]
  frameSrc = "https://www.youtube-nocookie.com https://open.spotify.com"
  imgSrc = "https://img.youtube.com"
  scriptSrc = "'unsafe-inline'"

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^PUBLIC_']

[outputs]
  home = ["HTML", "RSS", "LLMSTxt"]

[[menus.main]]
  name = "Music"
  url = "/music/"
  weight = 10

[[menus.main]]
  name = "Shows"
  url = "/shows/"
  weight = 20

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 30

[[menus.main]]
  name = "Contact"
  url = "/contact/"
  weight = 40

[[menus.main]]
  name = "Shop"
  url = "/shop/"
  weight = 50
