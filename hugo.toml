baseURL = "https://whatisverdezul.com/"
languageCode = "en-us"
title = "Verdèzul"
theme = "ryder"

[params]
  description = "Official site for Verdèzul — Los Angeles-based band. Music, tour dates, merch."
  analytics_provider = "posthog"
  showDarkToggle = false
  logo_png = "/images/logo-header.png"
  headerType = "-verdezul"
  footerType = "-verdezul"
  menuType = "-verdezul"
  showHomeFeed = false
  showBreadCrumbs = false

[params.csp]
  frameSrc = "https://www.youtube-nocookie.com https://open.spotify.com"

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^PUBLIC_']

[outputs]
  home = ["HTML", "RSS", "LLMSTxt"]

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 10

[[menus.main]]
  name = "Music"
  url = "/media/"
  weight = 20

[[menus.main]]
  name = "Shows"
  url = "/tour/"
  weight = 30

[[menus.main]]
  name = "Contact"
  url = "/contact/"
  weight = 40

[[menus.main]]
  name = "Store"
  url = "/shop/"
  weight = 50
